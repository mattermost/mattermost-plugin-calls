upstream app_cluster {
  # Sticky sessions by auth cookie so a user's HTTP requests always land on the
  # same node as their plugin-WS connection. The plugin keeps session state in
  # an in-memory map keyed by WS conn-id and only syncs leave/reconnect across
  # the cluster (server/plugin.go OnPluginClusterEvent), so a token HTTP request
  # routed to a different node returns 403 "session not found". `consistent`
  # uses ketama-style hashing so adding/removing a backend only remaps a slice
  # of users rather than all of them.
  hash $cookie_MMAUTHTOKEN consistent;
  server mm-server1:8065 fail_timeout=10s max_fails=10;
  server mm-server2:8065 fail_timeout=10s max_fails=10;
}

server {
  listen 8065;

  location ~ /api/v[0-9]+/(users/)?websocket$ {
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_http_version 1.1;
    client_max_body_size 50M;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Frame-Options SAMEORIGIN;
    proxy_buffers 256 16k;
    proxy_buffer_size 16k;
    proxy_read_timeout 600s;
    proxy_pass http://app_cluster;
  }

  location / {
    client_max_body_size 100M;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
	  proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Frame-Options SAMEORIGIN;
    proxy_pass http://app_cluster;
  }
}
